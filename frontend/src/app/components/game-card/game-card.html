<div class="card text-center">
    <h5 class="card-header">{{this.game.articleName}}</h5>
    <div class="card-body">
        <h5 class="card-title">{{this.game.subjectGameName}}</h5>
        <p class="card-text">{{splitContent}}</p>
        <button (click)="this.onActionClick()" class="btn btn-primary">{{this.actionName}}</button>
        <footer class="blockquote-footer">By {{game.authorLogin}}</footer>
    </div>
</div>
