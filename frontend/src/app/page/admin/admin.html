<div class="p-6">
  <h1 class="text-2xl font-bold mb-4">Admin Dashboard</h1>

  <p-tabView>

    <!-- ARTICLES -->
    <p-tabPanel header="Articles">

      <p-table [value]="articles" class="shadow rounded-lg">

        <ng-template pTemplate="header">
          <tr>
            <th>Nom</th>
            <th>Action</th>
          </tr>
        </ng-template>

        <ng-template pTemplate="body" let-article>
          <tr>
            <td>{{ article.subjectGameName }}</td>
            <td>
              <button pButton type="button" label="Delete"
                      class="p-button-danger"
                      (click)="deleteArticle(article.id)">
              </button>
            </td>
          </tr>
        </ng-template>

      </p-table>

    </p-tabPanel>

    <!-- USERS -->
    <p-tabPanel header="Users">

      <p-table [value]="users" class="shadow rounded-lg">

        <ng-template pTemplate="header">
          <tr>
            <th>Login</th>
            <th>Role</th>
            <th>Actions</th>
          </tr>
        </ng-template>

        <ng-template pTemplate="body" let-user>
          <tr>
            <td>{{ user.login }}</td>
            <td>{{ user.role }}</td>
            <td class="flex gap-2">

              <button pButton label="Ban"
                      class="p-button-warning"
                      (click)="banUser(user.id)">
              </button>

              <button pButton label="Role"
                      class="p-button-info"
                      (click)="changeRole(user)">
              </button>

            </td>
          </tr>
        </ng-template>

      </p-table>

    </p-tabPanel>

  </p-tabView>
</div>
