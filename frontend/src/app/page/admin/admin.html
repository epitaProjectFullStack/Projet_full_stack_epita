<div class="p-6">
  <h1 class="text-2xl font-bold mb-4">Admin Dashboard</h1>

  <!-- ARTICLES -->
  <div class="mb-6">
    <h2 class="text-xl font-semibold mb-2">Articles</h2>
    <app-article-table [articles]="this.articles()" (delete)="deleteArticle($event)" />
  </div>

  <!-- USERS -->
  <div>
    <h2 class="text-xl font-semibold mb-2">Users</h2>
    <app-admin-user-table 
      [users]="this.users()" 
      (banUser)="banUser($event)" 
      (unbanUser)="unbanUser($event)" 
      (changeUserRole)="changeUserRole($event.user, $event.role)" 
    />
    
  </div>
</div>
