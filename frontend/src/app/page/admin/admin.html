<div class="p-6">
  <h1 class="text-2xl font-bold mb-4">Admin Dashboard</h1>

  <!-- ARTICLES -->
  <div class="mb-6">
    <h2 class="text-xl font-semibold mb-2">Articles</h2>

    <table class="table-auto w-full border">
      <tr>
        <th>Nom</th>
        <th>Action</th>
      </tr>

      <tr *ngFor="let article of articles()">
        <td>{{ article.subjectGameName }}</td>
        <td>
         <button (click)="deleteArticle(article.uuid)">
            Delete
          </button>
        </td>
      </tr>
    </table>
  </div>

  <!-- USERS -->
  <div>
    <h2 class="text-xl font-semibold mb-2">Users</h2>

    <table class="table-auto w-full border">
      <tr>
        <th>Login</th>
        <th>Role</th>
        <th>Action</th>
      </tr>

      <tr *ngFor="let user of users()">
        <td>{{ user.login }}</td>
        <td>{{ user.role }}</td>
        <td>
          <button (click)="banUser(user.id)">Ban</button>
        </td>
      </tr>
    </table>
  </div>
</div>
