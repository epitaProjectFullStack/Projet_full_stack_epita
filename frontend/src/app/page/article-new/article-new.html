<div class="container-fluid">
    <form (ngSubmit)="onCreateClick()">
        <div class="form-group">
            <label for="gameName">Game Name:</label>
            <input type="text" id="gameName" class="form-control" value="Game Name" name="gameName" [(ngModel)]="gameName" required>
        </div>

        <div class="form-group">
            <label for="articleName">Article Name:</label>
            <input type="text" id="articleName" class="form-control" value="Article Name" name="articleName" [(ngModel)]="articleName" required>
        </div>
        
        <app-article-editor />

        <input type="submit" value="Create" class="floating-center btn btn-primary">
    </form>
</div>
