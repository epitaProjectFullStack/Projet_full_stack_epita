<div class="container-fluid">
    <form [formGroup]="articleForm" (ngSubmit)="onCreateClick()">
        <div class="form-group">
            <label for="gameName" class="form-label">Game Name:</label>
            <input 
            type="text" 
            id="gameName" 
            class="form-control" 
            value="Game Name" 
            name="gameName" 
            formControlName="gameName"
            [class.is-invalid]="articleForm.controls['gameName'].invalid && articleForm.controls['gameName'].touched"
            >
            @if (articleForm.controls['gameName'].invalid) {
                <div class="invalid-feedback">
                    Please Enter A Game Name.
                </div>
            }
        </div>

        <div class="form-group">
            <label for="articleName" class="form-label">Article Name:</label>
            <input 
            type="text" 
            id="articleName" 
            class="form-control" 
            value="Article Name" 
            name="articleName" 
            formControlName="articleName"
            [class.is-invalid]="articleForm.controls['articleName'].invalid && articleForm.controls['articleName'].touched"
            >
            @if (articleForm.controls['articleName'].invalid) {
                <div class="invalid-feedback">
                    Please Enter An Article Name.
                </div>
            }
        </div>
        
        <app-article-editor />

        <input type="submit" value="Create" class="floating-center btn btn-primary">
    </form>
</div>
