name: Release CI

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Get next version
        uses: reecetech/version-increment@2024.10.1
        id: version
        with:
          scheme: conventional_commits

      - name: Push Git Tag
        uses: rickstaa/action-create-tag@v1
        id: "tag_create"
        with:
          tag: ${{ steps.version.outputs.v-version }}
          tag_exists_error: false

      - name: Build backend image
        uses: docker/build-push-action@v2
        with:
          push: false
          tags: "srvf/backend:${{ steps.version.outputs.version }}"
          context: ./backend
        continue-on-error: true

      - name: Build frontend image
        uses: docker/build-push-action@v2
        with:
          push: false
          tags: "srvf/frontend:${{ steps.version.outputs.version }}"
          context: ./frontend
